# ZERO-DAY — conjunto de TREINO: benigno + ataques CONHECIDOS (dos, fuzzy, mitm).
# O modelo é treinado aqui. O replay/tamper ficam de fora de propósito.
seed: 42
packets_per_client: 200
output:
  pcap: traces/zeroday_train_known.pcap
attack:
  types: [dos, fuzzy, mitm]
  trigger_rate: 50      # prob. 1/N por mensagem — MENOR = mais ataques
verbose: {client: false, server: false, attacker: false}
